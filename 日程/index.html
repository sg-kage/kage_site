<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カゲマス 魔界殲滅戦争 日程</title>
    <meta name="description" content="カゲマスの魔界殲滅戦争（ギルドバトル）の開催日程一覧。次回開催までのカウントダウンとカレンダー登録に対応">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0b0d12;
            --bg-panel: rgba(20, 24, 33, 0.85);
            --bg-input: #161b26;
            --primary: #00f2ff;
            --primary-dim: rgba(0, 242, 255, 0.25);
            --text-main: #e0e6ed;
            --text-muted: #94a3b8;
            --border: #2b3342;
            --sat-color: #58a6ff;
            --sun-color: #ff7b72;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Noto Sans JP', "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-body);
            background-image:
                radial-gradient(circle at 50% 0%, rgba(0, 81, 255, 0.18) 0%, transparent 55%),
                repeating-linear-gradient(0deg, rgba(0, 242, 255, 0.015) 0 1px, transparent 1px 48px),
                repeating-linear-gradient(90deg, rgba(0, 242, 255, 0.015) 0 1px, transparent 1px 48px);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0 auto;
            padding: 20px 14px 30px;
            font-size: 14px;
            width: 100%;
            max-width: 780px;
        }

        /* --- ページヘッダー --- */
        .page-header { margin-bottom: 16px; }
        .page-header h1 {
            font-size: 1.45rem;
            font-weight: 700;
            color: #fff;
            margin: 0;
            letter-spacing: 0.04em;
            text-shadow: 0 0 14px rgba(0, 242, 255, 0.45);
        }
        .page-header h1::after {
            content: '';
            display: block;
            width: 90px;
            height: 2px;
            margin-top: 6px;
            background: linear-gradient(90deg, var(--primary), transparent);
            box-shadow: 0 0 8px var(--primary);
        }
        .page-sub {
            margin: 8px 0 0;
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.6;
        }
        .page-sub a { color: #4db8ff; text-decoration: none; }
        .page-sub a:hover { text-decoration: underline; }

        /* --- カウントダウン --- */
        .countdown-card {
            background: var(--bg-panel);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--primary-dim);
            border-radius: 14px;
            padding: 16px 18px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45), inset 0 0 40px rgba(0, 81, 255, 0.05);
        }
        .countdown-label {
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 0.08em;
        }
        .countdown-main {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
        }
        .countdown-main .num {
            color: var(--primary);
            font-size: 2rem;
            text-shadow: 0 0 12px rgba(0, 242, 255, 0.6);
            font-variant-numeric: tabular-nums;
        }
        .countdown-main.live {
            color: #ffd700;
            text-shadow: 0 0 14px rgba(255, 215, 0, 0.55);
            animation: pulse 1.6s ease-in-out infinite;
        }
        .countdown-dates {
            font-size: 12px;
            color: var(--text-muted);
            text-align: right;
            line-height: 1.7;
        }
        .countdown-dates b { color: var(--text-main); font-weight: 500; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }

        /* --- 設定エリア --- */
        .settings-panel {
            background: var(--bg-panel);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 16px;
        }
        .settings-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 14px;
            align-items: center;
        }
        .settings-row + .settings-row { margin-top: 10px; }
        .setting-label { font-size: 12px; color: var(--text-muted); }

        select, input[type="date"] {
            background: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: 0.2s;
        }
        select:hover, input[type="date"]:hover,
        select:focus, input[type="date"]:focus {
            border-color: var(--primary-dim);
            outline: none;
            box-shadow: 0 0 8px rgba(0, 242, 255, 0.15);
        }
        input[type="date"] { color-scheme: dark; }

        .check-label {
            font-size: 12px;
            cursor: pointer;
            color: var(--text-muted);
            display: inline-flex;
            align-items: center;
            gap: 5px;
            user-select: none;
        }
        .check-label input { accent-color: var(--primary); cursor: pointer; }

        .official-link {
            margin-left: auto;
            color: #4db8ff;
            font-size: 12px;
            text-decoration: none;
            white-space: nowrap;
        }
        .official-link:hover { text-decoration: underline; }

        /* --- テーブル --- */
        .table-wrapper {
            border-radius: 14px;
            border: 1px solid var(--border);
            overflow: hidden;
            background: rgba(13, 16, 22, 0.75);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.92rem;
            text-align: center;
        }

        thead th {
            padding: 10px 6px;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            color: #cfe9ff;
            background: rgba(16, 26, 44, 0.95);
            border-bottom: 1px solid var(--primary-dim);
        }
        thead .sub-th {
            font-size: 0.72rem;
            font-weight: 500;
            color: var(--text-muted);
            padding: 6px;
            background: rgba(13, 20, 34, 0.95);
        }
        thead .sub-th.土曜, thead .sub-th.日曜 { font-weight: 700; }

        td {
            padding: 11px 6px;
            border-top: 1px solid rgba(43, 51, 66, 0.6);
            font-family: 'Consolas', 'Noto Sans JP', monospace;
            color: var(--text-muted);
            position: relative;
            transition: background 0.15s;
        }
        td:not(:first-child) { border-left: 1px solid rgba(43, 51, 66, 0.4); }
        tbody tr:hover td { background: rgba(0, 242, 255, 0.04); }

        .date-w { font-size: 0.78em; opacity: 0.65; }

        /* 過去の日程は薄く */
        tr.past td { opacity: 0.38; }

        /* 進行中シーズン */
        tr.active td {
            background: rgba(0, 242, 255, 0.06);
            color: var(--text-main);
        }
        tr.active:hover td { background: rgba(0, 242, 255, 0.09); }
        tr.active td:first-child::before {
            content: "";
            position: absolute;
            left: 0;
            top: 12%;
            height: 76%;
            width: 3px;
            background: var(--primary);
            border-radius: 0 2px 2px 0;
            box-shadow: 0 0 10px var(--primary);
        }
        .now-badge {
            display: inline-block;
            background: rgba(0, 242, 255, 0.15);
            color: var(--primary);
            border: 1px solid var(--primary-dim);
            font-size: 0.65rem;
            font-weight: 700;
            padding: 1px 8px;
            border-radius: 10px;
            margin-bottom: 4px;
            letter-spacing: 0.1em;
        }

        /* 曜日カラー */
        .土曜 { color: var(--sat-color) !important; }
        .日曜 { color: var(--sun-color) !important; }

        .年区切り td {
            background: rgba(0, 81, 255, 0.08);
            color: var(--primary);
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            padding: 8px;
            font-family: 'Noto Sans JP', sans-serif;
        }

        .kikan-sep { color: #566073; margin: 0 4px; }

        .reg-btn {
            display: inline-block;
            background: rgba(35, 134, 54, 0.85);
            color: #fff;
            text-decoration: none;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.68rem;
            font-family: 'Noto Sans JP', sans-serif;
            margin-top: 6px;
            border: 1px solid rgba(63, 185, 80, 0.4);
            transition: 0.2s;
        }
        .reg-btn:hover {
            background: #2ea043;
            box-shadow: 0 0 10px rgba(63, 185, 80, 0.45);
        }
        .hidden-btn { display: none !important; }

        footer.creator-link {
            margin-top: 26px;
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.9;
        }
        footer.creator-link a { color: #4db8ff; text-decoration: none; }
        footer.creator-link a:hover { text-decoration: underline; }

        @media (max-width: 600px) {
            body { padding: 14px 8px 24px; }
            table { font-size: 11px; }
            td { padding: 9px 3px; }
            .kikan-sep { display: block; margin: 2px 0; }
            .countdown-card { flex-direction: column; align-items: flex-start; }
            .countdown-dates { text-align: left; }
            .official-link { margin-left: 0; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
        .countdown-card, .settings-panel, .table-wrapper { animation: fadeIn 0.45s ease-out; }
    </style>
</head>
<body>

    <header class="page-header">
        <h1>🗓 魔界殲滅戦争 日程</h1>
        <p class="page-sub">シーズンと殲滅戦（Day1〜Day3）の開催日一覧。カレンダー登録にも対応。<a href="https://www.shadow-garden-mog.jp/guildbattle-calendar/?from=ingame" target="_blank" rel="noopener">本家カレンダー ≫</a></p>
    </header>

    <div class="countdown-card" id="countdownCard">
        <div>
            <div class="countdown-label">NEXT 魔界殲滅戦争</div>
            <div class="countdown-main" id="countdownMain">--</div>
        </div>
        <div class="countdown-dates" id="countdownDates"></div>
    </div>

    <div class="settings-panel">
        <div class="settings-row">
            <span class="setting-label">開始日(木)</span>
            <input type="date" id="baseDate" value="2026-06-11" onchange="保存と生成()">
            <a class="official-link" href="https://www.shadow-garden-mog.jp/guildbattle-calendar/?from=ingame" target="_blank" rel="noopener">本家を確認 ≫</a>
        </div>
        <div class="settings-row">
            <select id="calType" onchange="保存と生成()">
                <option value="google">Google カレンダー</option>
                <option value="ios">iOS (Apple)</option>
                <option value="yahoo">Yahoo! カレンダー</option>
            </select>
            <select id="calTime" onchange="保存と生成()">
                <option value="20">20:00</option>
                <option value="21">21:00</option>
                <option value="22" selected>22:00</option>
                <option value="23">23:00</option>
            </select>
            <label class="check-label">
                <input type="checkbox" id="hideBtn" onchange="保存と生成()"> 登録ボタン非表示
            </label>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th rowspan="2">シーズン期間</th>
                    <th colspan="3">魔界殲滅戦争</th>
                </tr>
                <tr>
                    <th class="sub-th">Day1 (金)</th>
                    <th class="sub-th 土曜">Day2 (土)</th>
                    <th class="sub-th 日曜">Day3 (日)</th>
                </tr>
            </thead>
            <tbody id="meisai"></tbody>
        </table>
    </div>

    <footer class="creator-link">
        作成者: <a href="https://x.com/kagenotify" target="_blank" rel="noopener">kagenotify（X／旧Twitter）</a><br>
        Discord鯖: <a href="http://discord.gg/SfMWv5UPad" target="_blank" rel="noopener">陰マス通知</a><br>
        <small>
          このウェブサイトは、Team CARAVANおよびAiming Inc.とは一切関係がなく、これらの企業から公式な承認を受けたものではありません。
        </small>
    </footer>

<script>
    window.onload = function() {
        const cacheType = localStorage.getItem('calType');
        const cacheTime = localStorage.getItem('calTime');
        const cacheHide = localStorage.getItem('hideBtn');
        const cacheBase = localStorage.getItem('baseDate');
        if (cacheType) document.getElementById('calType').value = cacheType;
        if (cacheTime) document.getElementById('calTime').value = cacheTime;
        if (cacheHide !== null) document.getElementById('hideBtn').checked = (cacheHide === 'true');
        if (cacheBase) document.getElementById('baseDate').value = cacheBase;
        生成();
    };

    function 保存と生成() {
        localStorage.setItem('calType', document.getElementById('calType').value);
        localStorage.setItem('calTime', document.getElementById('calTime').value);
        localStorage.setItem('hideBtn', document.getElementById('hideBtn').checked);
        localStorage.setItem('baseDate', document.getElementById('baseDate').value);
        生成();
    }

    function getCalLink(title, dateObj, hour, type) {
        const start = new Date(dateObj);
        start.setHours(hour, 0, 0);
        const end = new Date(start);
        end.setHours(hour + 1, 0, 0);
        const fmt = (d) => d.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
        if (type === 'google') return `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${fmt(start)}/${fmt(end)}`;
        if (type === 'yahoo') return `https://calendar.yahoo.co.jp/?v=60&TITLE=${encodeURIComponent(title)}&ST=${fmt(start).slice(0,15)}Z&DUR=0100`;
        if (type === 'ios') {
            const ics = `BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nSUMMARY:${title}\nDTSTART:${fmt(start)}\nDTEND:${fmt(end)}\nEND:VEVENT\nEND:VCALENDAR`;
            return `data:text/calendar;charset=utf8,${encodeURIComponent(ics)}`;
        }
    }

    function 書式(d) {
        const y = d.getFullYear().toString().slice(-2);
        const m = (d.getMonth() + 1).toString().padStart(2, '0');
        const r = d.getDate().toString().padStart(2, '0');
        const w = ['日', '月', '火', '水', '木', '金', '土'][d.getDay()];
        return `${y}/${m}/${r}<span class="date-w">(${w})</span>`;
    }

    // カウントダウン表示用の短い日付（M/D(曜)）
    function 短書式(d) {
        const w = ['日', '月', '火', '水', '木', '金', '土'][d.getDay()];
        return `${d.getMonth() + 1}/${d.getDate()}(${w})`;
    }

    function 生成() {
        const body = document.getElementById('meisai');
        const calType = document.getElementById('calType').value;
        const calHour = parseInt(document.getElementById('calTime').value);
        const hideBtn = document.getElementById('hideBtn').checked;
        body.innerHTML = '';
        let d = new Date(document.getElementById('baseDate').value);
        const today = new Date();
        const todayMid = new Date(today.getFullYear(), today.getMonth(), today.getDate());
        let currentYear = d.getFullYear();
        let nextBattle = null; // { fri, sat, sun, live }

        for (let i = 0; i < 35; i++) {
            let sEnd = new Date(d); sEnd.setDate(d.getDate() + 21);
            let fri = new Date(d); fri.setDate(d.getDate() + 22);
            let sat = new Date(d); sat.setDate(d.getDate() + 23);
            let sun = new Date(d); sun.setDate(d.getDate() + 24);

            if (d.getFullYear() !== currentYear) {
                const sep = document.createElement('tr');
                sep.className = '年区切り';
                sep.innerHTML = `<td colspan="4">${d.getFullYear()}</td>`;
                body.appendChild(sep);
                currentYear = d.getFullYear();
            }

            const tr = document.createElement('tr');
            const seasonEnd = new Date(sun.getTime() + 86400000);
            const isActive = today >= d && today <= seasonEnd;
            const isPast = seasonEnd < todayMid;
            if (isActive) tr.className = 'active';
            else if (isPast) tr.className = 'past';

            // 次回（または開催中）の殲滅戦を記録
            if (!nextBattle && seasonEnd >= todayMid) {
                const live = todayMid >= new Date(fri.getFullYear(), fri.getMonth(), fri.getDate()) && todayMid <= new Date(sun.getFullYear(), sun.getMonth(), sun.getDate());
                if (live || fri >= todayMid) nextBattle = { fri, sat, sun, live };
            }

            const btnClass = hideBtn ? 'reg-btn hidden-btn' : 'reg-btn';
            const makeBtn = (title, date) => `<br><a href="${getCalLink(title, date, calHour, calType)}" class="${btnClass}" target="_blank">登録</a>`;
            const badge = isActive ? `<span class="now-badge">NOW</span><br>` : '';
            tr.innerHTML = `
                <td>${badge}${書式(d)}<span class="kikan-sep">〜</span>${書式(sEnd)}</td>
                <td>${書式(fri)}${makeBtn('カゲマス 殲滅戦 Day1', fri)}</td>
                <td class="土曜">${書式(sat)}${makeBtn('カゲマス 殲滅戦 Day2', sat)}</td>
                <td class="日曜">${書式(sun)}${makeBtn('カゲマス 殲滅戦 Day3', sun)}</td>
            `;
            body.appendChild(tr);
            d.setDate(d.getDate() + 28);
        }

        更新カウントダウン(nextBattle, todayMid);
    }

    function 更新カウントダウン(battle, todayMid) {
        const main = document.getElementById('countdownMain');
        const dates = document.getElementById('countdownDates');
        if (!battle) {
            main.textContent = '--';
            dates.textContent = '';
            return;
        }
        if (battle.live) {
            main.innerHTML = '⚔️ 殲滅戦 開催中！';
            main.classList.add('live');
        } else {
            const friMid = new Date(battle.fri.getFullYear(), battle.fri.getMonth(), battle.fri.getDate());
            const days = Math.round((friMid - todayMid) / 86400000);
            main.innerHTML = days === 0
                ? '本日 Day1 開始！'
                : `あと <span class="num">${days}</span> 日`;
            main.classList.remove('live');
        }
        dates.innerHTML = `Day1 <b>${短書式(battle.fri)}</b> ／ Day2 <b class="土曜">${短書式(battle.sat)}</b> ／ Day3 <b class="日曜">${短書式(battle.sun)}</b>`;
    }
</script>

</body>
</html>
