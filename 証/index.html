<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>討伐証 逆算計算機</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0c10; --card-bg: #11141a; --card-border: #1e2630;
      --primary: #00e5ff; --primary-dim: rgba(0, 229, 255, 0.15);
      --accent-red: #ff3d00; --accent-yellow: #ffea00;
      --text-main: #f0f0f0; --text-sub: #90a4ae; --radius: 8px;
    }
    body { 
      font-family: "Noto Sans JP", sans-serif; margin: 0; padding: 0.5em; 
      background-color: var(--bg-dark); color: var(--text-main);
      background-image: radial-gradient(circle at 50% 0%, #15202b 0%, var(--bg-dark) 100%);
    }
    h1 { text-align: center; color: var(--primary); font-size: 1.5em; margin: 0.5em 0; text-shadow: 0 0 10px var(--primary-dim); letter-spacing: 2px; }
    .disclaimer { text-align: center; font-size: 0.85em; color: var(--accent-yellow); margin-bottom: 1em; font-weight: bold; line-height: 1.5; padding: 0 1em; }

    .container { max-width: 720px; margin: 0 auto; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8em; margin-bottom: 1em; }
    .card { 
      background: var(--card-bg); border: 1px solid var(--card-border); 
      padding: 1.2em; border-radius: var(--radius); display: flex; flex-direction: column; gap: 1em;
      position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.6);
    }
    .form-row { display: flex; align-items: center; justify-content: space-between; min-height: 2.5em; }
    label { font-size: 0.9em; font-weight: bold; color: var(--text-sub); }
    
    /* 入力欄を大きく押しやすく */
    input[type="number"], select { 
      width: 5.5em; height: 2.8em; background: #000; color: var(--primary); border: 1px solid #334155; 
      border-radius: 6px; padding: 0.4em; text-align: right; font-size: 1.1em; font-family: "Roboto Mono", monospace;
      appearance: none; -webkit-appearance: none;
    }
    select { text-align-last: right; padding-right: 0.5em; width: 6.5em; }
    
    .mode-switch { display: flex; background: #000; padding: 3px; border-radius: 8px; border: 1px solid #334155; width: 100%; }
    .mode-switch label { flex: 1; text-align: center; cursor: pointer; padding: 0.6em 0; border-radius: 6px; font-size: 0.85em; transition: 0.2s; }
    .mode-switch input { display: none; }
    .mode-switch label:has(input:checked) { background: var(--primary); color: #000; font-weight: bold; }
    
    .just-input { border-color: var(--primary) !important; box-shadow: 0 0 10px var(--primary-dim); }

    /* 計算ボタンを巨大化 */
    button[type="submit"] { 
      background: var(--primary); color: #000; border: none; border-radius: var(--radius); padding: 1em;
      font-size: 1.2em; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s;
      margin-top: 0.5em;
    }
    button[type="submit"]:active { transform: scale(0.98); filter: brightness(0.9); }

    .result-container { margin-top: 1.2em; display: none; border-top: 1px solid var(--card-border); padding-top: 1em; }
    .timeline { position: relative; padding-left: 2em; }
    .timeline::before { content: ''; position: absolute; left: 12px; top: 10px; bottom: 25px; width: 2px; background: #334155; }
    
    .tl-step { 
      position: relative; background: #161b22; border: 1px solid var(--card-border); 
      border-radius: var(--radius); padding: 0.8em 1em; margin-bottom: 0.8em; display: flex; align-items: center; gap: 1em;
    }
    .tl-step.recover::after { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--primary); }
    .tl-step.consume::after { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--accent-red); }
    
    .tl-icon-circle { 
      width: 28px; height: 28px; background: #000; border: 1px solid #334155; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; position: absolute; left: -2.15em; font-size: 1em; 
    }
    .tl-main-val { font-size: 1.2em; font-weight: bold; color: #fff; font-family: "Roboto Mono", monospace; }
    .tl-label { font-size: 0.75em; color: var(--text-sub); font-weight: bold; margin-bottom: 2px; display: block; }
    .tl-sub { font-size: 0.85em; color: var(--text-sub); margin-left: 0.5em; }

    .tags { display: flex; gap: 0.5em; margin-top: 0.4em; flex-wrap: wrap; }
    .tag { font-size: 0.85em; padding: 4px 10px; border-radius: 4px; font-weight: bold; background: #000; border: 1px solid #334155; color: var(--primary); }
    
    .msg-box { padding: 0.8em 1em; border-radius: var(--radius); margin-bottom: 1em; font-size: 0.9em; line-height: 1.4; }
    .msg-info { border: 1px solid var(--primary-dim); color: var(--primary); background: rgba(0, 229, 255, 0.05); }
    .saved-toast { position: absolute; top: 4px; right: 8px; font-size: 0.7em; color: var(--primary); opacity: 0; transition: 0.5s; }

    @media (max-width: 600px) { 
      .form-grid { grid-template-columns: 1fr; gap: 0.8em; } 
      input[type="number"], select { width: 6em; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>討伐証 計算機</h1>
  <p class="disclaimer">下一桁が9の状態（自然回復待ちなど）を前提に計算しています</p>
  
  <form id="calcForm">
    <div class="form-grid">
      <div class="card">
        <div id="savedMsg1" class="saved-toast">保存完了</div>
        <div class="form-row" style="flex-direction: column; align-items: flex-start; gap: 0.5em;">
          <label>調整単位</label>
          <div class="mode-switch">
            <label><input type="radio" name="mode" value="MIN" checked> 60</label>
            <label><input type="radio" name="mode" value="MAX_120"> 120</label>
            <label><input type="radio" name="mode" value="LIMIT"> 最大</label>
          </div>
        </div>
        <div class="form-row"><label>現在の証</label><input type="number" id="currentTicket" value="0"></div>
        <div class="form-row"><label>現在のスタミナ</label><input type="number" id="currentStamina" value="999"></div>
        <div class="form-row">
          <label>最終日配布</label>
          <select id="finalBonusStamina"><option value="0">0</option><option value="100" selected>100</option><option value="200">200</option></select>
        </div>
        <div class="form-row"><label>目標着地</label><input type="number" id="targetStamina" class="just-input" value="999"></div>
      </div>
      <div class="card">
        <div id="savedMsg2" class="saved-toast">保存完了</div>
        <div class="form-row"><label>🥪 サンド (10)</label><input type="number" id="sandCount" value="30" max="30"></div>
        <div class="form-row"><label>🍔 バーガー (30)</label><input type="number" id="burgerCount" value="30" max="30"></div>
        <div class="form-row"><label>💎 石割上限</label><select id="stoneCount"></select></div>
      </div>
    </div>
    <button type="submit">計算を開始する</button>
  </form>
  <div id="result" class="result-container"></div>
</div>

<script>
  const stoneSel = document.getElementById('stoneCount');
  for(let i=0; i<=5; i++){
    let opt = document.createElement('option'); opt.value = i; opt.textContent = i + "回";
    stoneSel.appendChild(opt);
  }

  const STORAGE_KEY = 'priconne_calc_v14_stamina';
  function saveInputs() {
    const data = {
      mode: document.querySelector('input[name="mode"]:checked').value,
      ticket: document.getElementById('currentTicket').value,
      stamina: document.getElementById('currentStamina').value,
      bonus: document.getElementById('finalBonusStamina').value,
      target: document.getElementById('targetStamina').value,
      sand: document.getElementById('sandCount').value,
      burger: document.getElementById('burgerCount').value,
      stone: document.getElementById('stoneCount').value
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    document.querySelectorAll('.saved-toast').forEach(el => { el.style.opacity = 1; setTimeout(() => el.style.opacity = 0, 800); });
  }

  function loadInputs() {
    const raw = localStorage.getItem(STORAGE_KEY); if (!raw) return;
    const d = JSON.parse(raw);
    if(d.mode) {
      const targetRadio = document.querySelector(`input[name="mode"][value="${d.mode}"]`);
      if(targetRadio) targetRadio.checked = true;
    }
    document.getElementById('currentTicket').value = d.ticket || 0;
    document.getElementById('currentStamina').value = d.stamina || 999;
    document.getElementById('finalBonusStamina').value = d.bonus || 100;
    document.getElementById('targetStamina').value = d.target || 999;
    document.getElementById('sandCount').value = d.sand || 0;
    document.getElementById('burgerCount').value = d.burger || 0;
    document.getElementById('stoneCount').value = d.stone || 0;
  }
  document.querySelectorAll('input, select').forEach(el => el.addEventListener('change', saveInputs));
  window.addEventListener('DOMContentLoaded', loadInputs);

  const SAFETY_THRESHOLD = 150;

  function simulate(start, consume, items, bonus) {
    let steps = [], cur = start, rem = consume, p = {...items};
    let safetyLoop = 0;

    while ((rem > 0 || p.stone > 0 || p.burger > 0 || p.sand > 0) && safetyLoop < 100) {
      safetyLoop++;
      let maxCanConsume = cur - (SAFETY_THRESHOLD + 1);
      let safeLimit = Math.floor(maxCanConsume / 10) * 10;
      
      if (safeLimit > 0 && rem > 0) {
        let d = Math.min(rem, safeLimit);
        cur -= d; rem -= d;
        steps.push({type:'consume', val:d, after:cur});
      } else {
        let r = 0, used = {stone:0, burger:0, sand:0};
        while (cur <= 850) {
          if (p.sand > 0) { p.sand--; used.sand++; cur += 10; r += 10; }
          else if (p.burger > 0) { p.burger--; used.burger++; cur += 30; r += 30; }
          else if (p.stone > 0) { p.stone--; used.stone++; cur += 100; r += 100; }
          else break;
          if (r >= 200) break; 
        }
        if (r > 0) steps.push({type:'recover', used, val:r, after:cur});
        else if (rem > 0) {
          cur -= rem; steps.push({type:'consume', val:rem, after:cur}); rem = 0;
        } else break;
      }
    }
    if (bonus > 0) { cur += bonus; steps.push({type:'bonus', val:bonus, after:cur}); }
    return {steps, final:cur};
  }

  function solve(inputs, mode) {
    const {ticket, stamina, targetStamina, bonusStamina, sandCount, burgerCount, stoneCount} = inputs;
    let res = [];
    for (let s = 0; s <= stoneCount; s++) {
      for (let b = 0; b <= burgerCount; b++) {
        const recovery = (sandCount * 10) + (b * 30) + (s * 100);
        const mustC = (stamina + bonusStamina + recovery) - targetStamina;
        if (mustC >= 0 && mustC % 10 === 0) {
          const finalT = ticket + (mustC / 10);
          if (finalT % 60 === 0) res.push({
            finalTicket: finalT, consume: mustC, 
            items: {sand:sandCount, burger:b, stone:s}, 
            mod: (finalT % 120 === 0 ? 120 : 60)
          });
        }
      }
    }
    if (!res.length) return null;
    if (mode === 'MIN') return res.sort((a,b)=>a.consume - b.consume)[0];
    if (mode === 'MAX_120') {
      let r120 = res.filter(r=>r.mod === 120).sort((a,b)=>a.consume - b.consume);
      return r120.length ? r120[0] : res.sort((a,b)=>a.consume - b.consume)[0];
    }
    return res.sort((a,b)=>b.finalTicket - a.finalTicket)[0];
  }

  document.getElementById('calcForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const mode = document.querySelector('input[name="mode"]:checked').value;
    const inputs = {
      ticket: parseInt(document.getElementById('currentTicket').value) || 0,
      stamina: parseInt(document.getElementById('currentStamina').value) || 0,
      targetStamina: parseInt(document.getElementById('targetStamina').value) || 0,
      bonusStamina: parseInt(document.getElementById('finalBonusStamina').value) || 0,
      sandCount: parseInt(document.getElementById('sandCount').value) || 0,
      burgerCount: parseInt(document.getElementById('burgerCount').value) || 0,
      stoneCount: parseInt(document.getElementById('stoneCount').value) || 0
    };
    const result = solve(inputs, mode);
    const resDiv = document.getElementById('result'); resDiv.style.display = 'block';
    if (result) {
      const sim = simulate(inputs.stamina, result.consume, result.items, inputs.bonusStamina);
      let h = `<div class="msg-box msg-info">計算完了：目標スタミナに向けて${mode==='LIMIT'?'最大稼ぎ':'最短'}手順を表示</div><div class="timeline">`;
      sim.steps.forEach(s => {
        if (s.type === 'recover') {
          let t = ''; 
          if(s.used.stone) t += `<span class="tag">💎 石割 ${s.used.stone}回</span>`;
          if(s.used.burger) t += `<span class="tag">🍔 バーガー ${s.used.burger}個</span>`;
          if(s.used.sand) t += `<span class="tag">🥪 サンド ${s.used.sand}個</span>`;
          h += `<div class="tl-step recover"><div class="tl-icon-circle">💊</div><div class="tl-content"><span class="tl-label">アイテム使用</span><div class="tags">${t}</div><div class="tl-sub">→ スタミナ ${s.after}</div></div></div>`;
        } else if (s.type === 'consume') h += `<div class="tl-step consume"><div class="tl-icon-circle">⚔️</div><div class="tl-content"><span class="tl-label">周回消費</span><span class="tl-main-val">${s.val} スタミナ</span><span class="tl-sub">残 ${s.after}</span></div></div>`;
        else h += `<div class="tl-step"><div class="tl-icon-circle">🎁</div><div class="tl-content"><span class="tl-label">最終日配布</span><span class="tl-main-val">+${s.val}</span></div></div>`;
      });
      h += `<div class="tl-step" style="border:1px solid var(--primary);"><div class="tl-icon-circle" style="border-color:var(--primary)">✨</div><div class="tl-content"><div style="display:flex; justify-content:space-between; align-items:center;"><div><span class="tl-label">完了・目標一致</span><span class="tl-main-val" style="color:var(--primary)">スタミナ ${sim.final}</span></div><div style="text-align:right;"><div style="color:var(--accent-yellow); font-weight:bold; font-size:1.1em;">${result.finalTicket} 枚</div><div style="font-size:0.8em; color:var(--text-sub);">${result.mod}枚単位 調整</div></div></div></div></div></div>`;
      resDiv.innerHTML = h;
    } else resDiv.innerHTML = '<div class="msg-box" style="border:1px solid var(--accent-red); color:var(--accent-red);">条件に合うルートがありません</div>';
  });
</script>
</body>
</html>
